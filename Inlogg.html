<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inlogg</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center">Logga In</h2>

        <form action="login.jsp" method="post" class="space-y-4">
            <div>
                <label for="Användarnamn" class="block text-gray-700">Användarnamn:</label>
                <input type="text" id="Användarnamn" name="Användarnamn" class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">       
            </div>
            <div>
                <label for="password" class="block text-gray-700">Lösenord:</label>
                <input type="password" id="password" name="password" class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600 transition duration-200">
                 Logga in
                </button>
            </div>
        </form>
    </div>
</body>
</html>
